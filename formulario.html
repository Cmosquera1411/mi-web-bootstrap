<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Formulario - Academia</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS propio -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-5">
  <div class="card shadow p-4">

    <h2 class="text-center mb-4">Inscripción a la Academia de Fútbol</h2>
    <img src="img/equipo.jpg" class="img-fluid rounded mb-3">

    <form action="respuesta.html">

      <!-- Nombre -->
      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-control" placeholder="Tu nombre" required>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" placeholder="ejemplo@email.com" required>
      </div>

      <!-- Edad -->
      <div class="mb-3">
        <label class="form-label">Edad</label>
        <input type="number" class="form-control" required>
      </div>

      <!-- Posición -->
      <div class="mb-3">
        <label class="form-label">Posición en el campo</label>
        <select class="form-control">
          <option>Portero</option>
          <option>Defensa</option>
          <option>Centrocampista</option>
          <option>Delantero</option>
        </select>
      </div>

      <!-- Nivel -->
      <div class="mb-3">
        <label class="form-label">Nivel</label>
        <select class="form-control">
          <option>Principiante</option>
          <option>Intermedio</option>
          <option>Avanzado</option>
        </select>
      </div>

      <!-- Mensaje -->
      <div class="mb-3">
        <label class="form-label">Mensaje</label>
        <textarea class="form-control" rows="3" placeholder="Cuéntanos algo sobre ti"></textarea>
      </div>

      <!-- Botón -->
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Enviar solicitud</button>
      </div>

    </form>

  </div>
</div>

</body>
</html>
